experiment_name: mononuclear_resnet18_public_demo

data:
  data_root: ./data/example_dataset_release
  manifest_path: ./manifests_templates/tile_manifest_template.csv
  include_suspect: true
  usable_slide_quality_status:
    - evaluable
    - usable
  num_workers: 4
  pin_memory: true

task:
  name: mononuclear
  label_column: mononuclearinfiltration
  num_classes: 5
  description: Five-class MononuclearInfiltration prediction with analysis-unit aggregation.

model:
  backbone: resnet18
  pretrained: true
  ordinal_mode: false

training:
  seed: 20260413
  device: cuda
  max_epochs: 35
  batch_size: 64
  learning_rate: 0.0003
  weight_decay: 0.0001
  loss: cross_entropy
  focal_gamma: 2.0
  use_amp: true
  use_weighted_sampler: true
  early_stopping_patience: 7
  lr_scheduler: reduce_on_plateau
  lr_scheduler_patience: 2
  lr_scheduler_factor: 0.5
  monitor_metric: analysis_unit_weighted_f1
  maximize_metric: true

split:
  strategy: group_stratified_shuffle_split
  val_fraction: 0.25
  allow_fallback_random: false
  cross_validation:
    enabled: false
    n_splits: 5

aggregation:
  primary_method: mean_probability

augmentation:
  image_size: 224
  random_resized_crop_scale: [0.9, 1.0]
  horizontal_flip_prob: 0.5
  vertical_flip_prob: 0.5
  rotation_degrees: 10
  color_jitter:
    brightness: 0.05
    contrast: 0.05
    saturation: 0.05
    hue: 0.0
  gaussian_blur_prob: 0.1
  gaussian_blur_radius_min: 0.1
  gaussian_blur_radius_max: 0.6
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

output:
  root_dir: results
  hard_example_count: 50

